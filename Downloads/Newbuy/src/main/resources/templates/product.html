<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inside Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#111;
color:white;
}

/* NAVBAR */

.navbar{
height:70px;
background:#1c1c1c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
box-shadow:0 5px 15px rgba(0,0,0,0.6);
}

.logo{
font-size:22px;
font-weight:600;
}

.nav-right{
display:flex;
gap:25px;
align-items:center;
}

.cart{
background:#ff9800;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* STORE FLOOR */

.store{
padding:50px;
}

/* CATEGORY HALLS */

.halls{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
margin-top:40px;
}

/* HALL CARD */

.hall{
height:260px;
border-radius:10px;
overflow:hidden;
cursor:pointer;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
transition:0.4s;
}

.hall img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(70%);
}

.hall:hover{
transform:scale(1.05);
}

.hall-title{
position:absolute;
bottom:20px;
left:20px;
font-size:24px;
font-weight:600;
}

/* BILLING COUNTER */

.counter{
margin-top:60px;
background:#1c1c1c;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.counter h2{
margin-bottom:15px;
}

.checkout-btn{
margin-top:15px;
padding:10px 20px;
background:#4caf50;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
Zap Waves Store
</div>

<div class="nav-right">

<div>Account</div>

<div class="cart">
Cart (0)
</div>

</div>

</div>

<!-- STORE -->

<div class="store">

<h1>Choose a Section</h1>

<div class="halls">

<div class="hall" onclick="openHall('men.html')">
<img src="men.jpg">
<div class="hall-title">Men's Wear</div>
</div>

<div class="hall" onclick="openHall('women.html')">
<img src="women.jpg">
<div class="hall-title">Women's Wear</div>
</div>

<div class="hall" onclick="openHall('kids.html')">
<img src="kids.jpg">
<div class="hall-title">Kids Wear</div>
</div>

</div>

<!-- BILLING COUNTER -->

<div class="counter">

<h2>Billing Counter</h2>

<p>Your selected items will appear here before checkout.</p>

<button class="checkout-btn">
Proceed to Checkout
</button>

</div>

</div>

<script>

function openHall(page){

window.location.href = page;

}

</script>

</body>
</html>
